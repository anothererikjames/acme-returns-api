$kind: http-request
name: GET /refunds
url: "{{baseUrl}}/refunds"
method: GET
headers:
  Authorization: Bearer {{token}}
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 200', () => pm.response.to.have.status(200));

      pm.test('Has data array', () =>
      pm.expect(pm.response.json().data).to.be.an('array'));

      pm.test('No failed refunds pending > 24h', () => {
        const failed = pm.response.json().data.filter(r => r.status === 'failed');
        const oldFailed = failed.filter(r => {
          const created = new Date(r.createdAt).getTime();
          return (Date.now() - created) > 86400000;
        });
        pm.expect(oldFailed.length).to.eql(0);
      });
order: 1000
