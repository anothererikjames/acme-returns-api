$kind: http-request
name: GET /policies
url: "{{baseUrl}}/policies"
method: GET
headers:
  Authorization: Bearer {{token}}
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 200', () => pm.response.to.have.status(200));

      pm.test('Has policies array', () =>
      pm.expect(pm.response.json().data).to.be.an('array'));

      pm.test('Each policy has windowDays', () => {
        pm.response.json().data.forEach(p => {
          pm.expect(p.windowDays).to.be.a('number').and.to.be.above(0);
        });
      });
order: 1000
