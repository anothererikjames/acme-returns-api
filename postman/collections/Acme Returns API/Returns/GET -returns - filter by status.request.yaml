$kind: http-request
name: GET /returns - filter by status
url: "{{baseUrl}}/returns?status=approved"
method: GET
headers:
  Authorization: Bearer {{token}}
queryParams:
  status: approved
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status is 200', () => pm.response.to.have.status(200));
      pm.test('All returns match status filter', () => {
        pm.response.json().data.forEach(r => {
          pm.expect(r.status).to.eql('approved');
        });
      });
order: 5000
