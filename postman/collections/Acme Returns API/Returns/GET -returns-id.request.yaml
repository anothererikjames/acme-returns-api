$kind: http-request
name: GET /returns/:id
url: "{{baseUrl}}/returns/{{returnId}}"
method: GET
headers:
  Authorization: Bearer {{token}}
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 200', () => pm.response.to.have.status(200));

      pm.test('Return has required fields', () => {
        const json = pm.response.json();
        pm.expect(json).to.have.all.keys('id','orderId','customerId','items','status','createdAt','updatedAt');
      });

      pm.test('Items is array', () =>
      pm.expect(pm.response.json().items).to.be.an('array'));
order: 3000
