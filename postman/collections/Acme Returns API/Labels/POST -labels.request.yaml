$kind: http-request
name: POST /labels
url: "{{baseUrl}}/labels"
method: POST
headers:
  Authorization: Bearer {{token}}
  Content-Type: application/json
body:
  type: text
  content: '{"returnId": "{{returnId}}", "carrier": "UPS", "serviceLevel": "ground"}'
scripts:
  - type: afterResponse
    code: >-
      pm.test('Status is 201', () => pm.response.to.have.status(201));

      pm.test('Label has tracking number', () =>
      pm.expect(pm.response.json()).to.have.property('trackingNumber'));

      pm.test('Label has download URL', () => {
        const url = pm.response.json().downloadUrl;
        pm.expect(url).to.match(/^https:\/\//);
      });

      pm.collectionVariables.set('labelId', pm.response.json().id);
order: 1000
